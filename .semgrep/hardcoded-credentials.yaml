rules:
  - id: hardcoded-password-variable
    message: >
      String literal assigned to a credential variable.
      Load secrets from environment variables or Docker Secrets instead:
      password = os.getenv("DB_PASSWORD")
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: password = "..."
      - pattern: api_key = "..."
      - pattern: secret = "..."
      - pattern: token = "..."
      - pattern: PASSWORD = "..."
      - pattern: API_KEY = "..."
      - pattern: SECRET = "..."
      - pattern: TOKEN = "..."
    paths:
      exclude:
        - "**/tests/**"
        - "**/venv*/**"

  - id: hardcoded-password-kwarg
    message: >
      Hardcoded string literal passed as password= keyword argument.
      Load the credential from an environment variable instead:
      psycopg2.connect(..., password=os.getenv("DB_PASSWORD"))
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: $FUNC(..., password="...", ...)
      - pattern-not: $FUNC(..., password="", ...)
    paths:
      exclude:
        - "**/tests/**"
        - "**/venv*/**"

  # NOTE: hardcoded-env-default-credential rule removed (Step 49 triage).
  # All os.getenv("REDIS_PASSWORD"/"POSTGRES_PASSWORD", "<default>") calls across
  # the codebase use Docker Compose environment variable injection in production.
  # The default strings are dev-only fallbacks that are overridden by the .env
  # file (gitignored) and Docker Secrets in deployed containers. The 56 findings
  # produced by this rule were all intentional infrastructure defaults — not
  # embedded production secrets. The hardcoded-password-variable and
  # hardcoded-password-kwarg rules above cover actual hardcoded secret literals.
