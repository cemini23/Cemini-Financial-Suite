rules:
  - id: hardcoded-password-variable
    message: >
      String literal assigned to a credential variable.
      Load secrets from environment variables or Docker Secrets instead:
      password = os.getenv("DB_PASSWORD")
    severity: ERROR
    languages: [python]
    pattern-either:
      - pattern: password = "..."
      - pattern: api_key = "..."
      - pattern: secret = "..."
      - pattern: token = "..."
      - pattern: PASSWORD = "..."
      - pattern: API_KEY = "..."
      - pattern: SECRET = "..."
      - pattern: TOKEN = "..."
    paths:
      exclude:
        - "**/tests/**"
        - "**/venv*/**"

  - id: hardcoded-password-kwarg
    message: >
      Hardcoded string literal passed as password= keyword argument.
      Load the credential from an environment variable instead:
      psycopg2.connect(..., password=os.getenv("DB_PASSWORD"))
    severity: ERROR
    languages: [python]
    patterns:
      - pattern: $FUNC(..., password="...", ...)
      - pattern-not: $FUNC(..., password="", ...)
    paths:
      exclude:
        - "**/tests/**"
        - "**/venv*/**"

  - id: hardcoded-env-default-credential
    message: >
      os.getenv() with a hardcoded default credential string.
      The fallback makes it trivial to access the service with a well-known password.
      Remove the default and require the environment variable to be explicitly set.
    severity: WARNING
    languages: [python]
    pattern-either:
      - pattern: os.getenv("POSTGRES_PASSWORD", "...")
      - pattern: os.getenv("REDIS_PASSWORD", "...")
      - pattern: os.getenv("DB_PASSWORD", "...")
      - pattern: os.getenv("POSTGRES_PASS", "...")
    paths:
      exclude:
        - "**/tests/**"
        - "**/venv*/**"
