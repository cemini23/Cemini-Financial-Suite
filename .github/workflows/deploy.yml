name: Secure PII Audit & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (lint + security via S rules)
        run: ruff check .

      - name: Run ruff format check (format drift report — non-blocking)
        # Documents format drift; auto-formatting is a separate cleanup PR.
        # 196 files have known drift from Step 34c migration.
        continue-on-error: true
        run: ruff format --check .

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (all requirements files)
        run: |
          pip-audit \
            -r requirements.txt \
            -r QuantOS/requirements.txt \
            -r "Kalshi by Cemini/requirements.txt" \
            --strict

  # ── TRIVY CONTAINER & FILESYSTEM SCANNING (Step 34d) ──────────────────────
  # Scans repo filesystem for misconfigs and embedded secrets.
  # Image scanning (trivy image) is done on the server via scripts/trivy-scan.sh
  # because Docker builds happen on the VPS, not in the CI runner.
  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (misconfigs, secrets, Dockerfiles)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          # exit-code 0 here; image scan (exit 1 on CRITICAL) runs via trivy-scan.sh
          exit-code: 0

      - name: Upload Trivy FS SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  # ── SEMGREP CUSTOM RULES + TRAIL OF BITS (Step 34e) ──────────────────────
  # Runs 4 trading-specific custom rules + Trail of Bits baseline.
  # Non-blocking: findings appear in GitHub Security tab as SARIF.
  # Requires no Semgrep account token for custom + public rules.
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install semgrep
        run: pip install semgrep

      - name: Run Semgrep (custom trading rules + Trail of Bits)
        # continue-on-error so SARIF upload always runs even if findings exist
        continue-on-error: true
        run: |
          semgrep scan \
            --config .semgrep/ \
            --config p/trailofbits \
            --sarif \
            -o semgrep.sarif \
            --metrics=off \
            .

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep-custom

  audit-and-deploy:
    # Core quality gates: lint + dep audit must pass before secrets scan + deploy.
    # trivy + semgrep run in parallel but are informational (non-blocking on deploy).
    needs: [lint, pip-audit]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures TruffleHog can scan the entire history for secrets

      # 1. PII & SECRET AUDIT (The Gatekeeper)
      # This scans for hardcoded API keys, passwords, and PII

      # For pull requests: scan the diff between PR base and head
      - name: TruffleHog Secret Scan (pull_request)
        id: security-pr
        continue-on-error: false
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified,unknown
        if: github.event_name == 'pull_request'

      # For direct pushes to main: scan only the commits in this push
      - name: TruffleHog Secret Scan (push)
        id: security
        continue-on-error: false
        uses: trufflesecurity/trufflehog@main
        with:
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified
        if: github.event_name == 'push'

      # 2. SECURE DEPLOYMENT VIA SSH
      # Requires a GitHub secret: DEPLOY_SSH_KEY (private key for root@5.161.53.103)
      # To set up: Settings → Secrets → Actions → New repository secret
      #   Name: DEPLOY_SSH_KEY
      #   Value: contents of your private key (~/.ssh/id_ed25519 or similar)
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '[:space:]' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 5.161.53.103 >> ~/.ssh/known_hosts

      - name: Update Bot on Server
        id: deploy
        continue-on-error: false
        run: |
          echo "Deploying Cemini Suite to 5.161.53.103..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes root@5.161.53.103 "
            set -e &&
            cd /opt/cemini &&
            git pull origin main &&
            [ -f .env ] || { echo 'ERROR: .env missing on server — aborting docker deploy'; exit 1; } &&
            docker compose down &&
            docker compose up --build -d &&
            sleep 10 &&
            docker compose ps
          "

      # 3. CI SUMMARY — always runs so you can see results at a glance
      - name: CI Summary
        if: always()
        run: |
          echo "=== CI RESULTS ==="
          echo "Lint (ruff):          ${{ needs.lint.result }}"
          echo "Dep scan (pip-audit): ${{ needs.pip-audit.result }}"
          echo "Secret Scan:          ${{ steps.security.outcome }}"
          echo "Deploy:               ${{ steps.deploy.outcome }}"
          echo "(trivy + semgrep run in parallel — check Security tab for findings)"
          echo ""
          if [ "${{ steps.deploy.outcome }}" = "failure" ]; then
            echo "WARNING: Deploy failed — SSH or docker compose error on server"
          fi
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "OK: Deployed successfully to root@5.161.53.103:/opt/cemini"
          fi

  # ── AUTO-DOCUMENTATION ───────────────────────────────────────────────────────
  # Runs in parallel with audit-and-deploy after security gates pass.
  # Parses docker-compose.yml, requirements, and test suite to inject fresh
  # sections into README.md, PROJECT_SUMMARY.md, and per-directory READMEs.
  # Only commits when content actually changed — never creates empty commits.
  # [skip ci] in the commit message prevents infinite CI loops.
  update-docs:
    runs-on: ubuntu-latest
    needs: [lint, pip-audit]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Generate documentation
        run: python scripts/generate_docs.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md PROJECT_SUMMARY.md \
                  QuantOS/README.md \
                  "Kalshi by Cemini/README.md" \
                  trading_playbook/README.md || true
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "docs: auto-update READMEs [skip ci]"
            git push
            echo "Documentation committed and pushed."
          fi

# NOTE — Docker layer caching:
# Builds run on the VPS server (via SSH in the deploy step), not inside the
# GitHub Actions runner. The server's local Docker layer cache already provides
# layer reuse between runs. GitHub Actions GHA cache (type=gha) applies only
# when docker/build-push-action builds inside the runner — N/A here.
