# ============================================================
# Cemini Financial Suite — Redis Configuration (Step 35)
# Hybrid AOF + RDB preamble for max 1-second data loss on crash.
# ============================================================

# --- Authentication ---
# requirepass is set at runtime via CLI arg to pick up ${REDIS_PASSWORD}
# so it is NOT set here (avoids hardcoding in git-tracked file).

# --- AOF Persistence (primary — 1-second durability) ---
appendonly yes
appendfsync everysec
aof-use-rdb-preamble yes
no-appendfsync-on-rewrite no

# --- RDB Snapshots (secondary — coarse backup layer) ---
# Save if at least N keys changed in M seconds
save 900 1
save 300 10
save 60 10000

# --- Data directory ---
dir /data

# --- Memory limits (Step 49b) ---
maxmemory 512mb
maxmemory-policy noeviction

# --- Network ---
bind 0.0.0.0
protected-mode no
