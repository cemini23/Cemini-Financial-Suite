# ============================================================
# Cemini Financial Suite — Docker Compose / Swarm Stack
# Step 34a: Added deploy: blocks for Swarm compatibility.
#
# deploy: mode:
#   docker compose up --build -d        (development, local)
#   docker stack deploy -c docker-compose.yml cemini  (production Swarm)
#
# NOTE: docker stack deploy requires pre-built images (build: is ignored).
#   Run `docker compose build` first, then `docker stack deploy`.
#   See scripts/swarm-init.sh for full procedure.
#
# Network note: networks have no explicit driver here.
#   docker compose uses bridge (default)
#   docker stack deploy uses overlay (default)
# ============================================================

services:
  # --- THE HEART (Data Storage) ---
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres
    restart: always
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quest}
      - POSTGRES_DB=qdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./archives:/mnt/archive
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d qdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 10
      update_config:
        order: stop-first   # postgres is stateful — stop old before starting new

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    expose:
      - "80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@cemini.com
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-admin}
    depends_on:
      - postgres
    networks:
      - edge_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first

  # --- THE SPINAL CORD (Messaging) ---
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-cemini_redis_2026}"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cemini_redis_2026}
    volumes:
      - redis_data:/data
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      update_config:
        order: stop-first   # redis is stateful — stop old before starting new

  # --- NODE 1: PERCEPTION (Ingestion) ---
  polygon_feed:
    build:
      context: .
      dockerfile: Dockerfile.ingestor
    image: cemini-ingestor:latest
    container_name: polygon_ingestor
    restart: always
    env_file: .env
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- NODE 2-4: THE BRAIN (Intelligence) ---
  brain:
    build:
      context: .
      dockerfile: Dockerfile.brain
    image: cemini-brain:latest
    container_name: brain
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
    depends_on:
      - redis
      - postgres
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- SIGNAL GENERATOR (Brain logic) ---
  # DISABLED (2026-02-24): Redundant with the `brain` service.
  # Use `docker compose --profile signal_generator up` to re-enable for testing.
  # In Swarm mode: profiles are not supported; replicas: 0 keeps this disabled.
  signal_generator:
    build:
      context: ./QuantOS
      dockerfile: Dockerfile.brain
    image: cemini-signal-generator:latest
    container_name: signal_generator
    restart: always
    profiles: ["signal_generator"]
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - postgres
      - redis
    networks:
      - app_net
      - data_net
    deploy:
      replicas: 0    # Swarm-native gate — keeps service disabled in stack mode
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first

  # --- THE SCRIBE (Logging) ---
  logger:
    build:
      context: .
      dockerfile: Dockerfile.logger
    image: cemini-logger:latest
    container_name: scribe_logger
    restart: always
    volumes:
      - .:/app
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    command: ["python", "logger_service.py"]
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- THE COACH (Analysis) ---
  analyzer:
    build:
      context: .
      dockerfile: Dockerfile.analyzer
    image: cemini-analyzer:latest
    container_name: coach_analyzer
    restart: always
    volumes:
      - .:/app
      - ./archives:/mnt/archive
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - postgres
      - redis
    command: ["python", "analyzer.py"]
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- SCRAPERS (Intelligence) ---
  social_scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: cemini-scraper:latest
    container_name: social_scraper
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
      - ENABLE_MOCK_SOCIAL=false
    depends_on:
      - redis
      - postgres
    command: ["python", "scrapers/social_scraper.py"]
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  macro_scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: cemini-scraper:latest
    container_name: macro_scraper
    restart: always
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
    depends_on:
      - redis
      - postgres
    command: ["python", "scrapers/macro_harvester.py"]
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- GDELT GEOPOLITICAL HARVESTER ---
  gdelt_harvester:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    image: cemini-scraper:latest
    container_name: gdelt_harvester
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cemini_redis_2026}
      - DB_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quest}
      - GDELT_SCAN_INTERVAL=${GDELT_SCAN_INTERVAL:-900}
    volumes:
      - .:/app
      - ./archives:/mnt/archive
    command: ["python", "scrapers/gdelt_harvester.py"]
    depends_on:
      - redis
      - postgres
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- KALSHI AUTOPILOT (Prediction Market Brain) ---
  kalshi_autopilot:
    build:
      context: .
      dockerfile: Dockerfile.autopilot
    image: cemini-autopilot:latest
    container_name: kalshi_autopilot
    restart: always
    env_file:
      - "Kalshi by Cemini/.env"
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cemini_redis_2026}
      - DB_HOST=postgres
      - KALSHI_PRIVATE_KEY_PATH=private_key.pem
      - SOCIAL_ALPHA_LIVE=${SOCIAL_ALPHA_LIVE:-false}
      - WEATHER_ALPHA_LIVE=${WEATHER_ALPHA_LIVE:-false}
    volumes:
      - "./Kalshi by Cemini/private_key.pem:/app/Kalshi by Cemini/private_key.pem:ro"
    depends_on:
      - redis
      - postgres
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- ROVER SCANNER (Real-time Kalshi WebSocket Market Intelligence) ---
  rover_scanner:
    build:
      context: .
      dockerfile: Dockerfile.autopilot
    image: cemini-autopilot:latest
    container_name: rover_scanner
    restart: always
    env_file:
      - "Kalshi by Cemini/.env"
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cemini_redis_2026}
      - DB_HOST=postgres
      - KALSHI_PRIVATE_KEY_PATH=private_key.pem
    volumes:
      - "./Kalshi by Cemini/private_key.pem:/app/Kalshi by Cemini/private_key.pem:ro"
    depends_on:
      - redis
    command: ["python", "ws_rover_runner.py"]
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- NODE 5: THE SWORD (Execution) ---
  ems:
    build:
      context: .
      dockerfile: Dockerfile.ems
    image: cemini-ems:latest
    container_name: ems_executor
    restart: always
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DB_HOST=postgres
      - QUANTOS_HOST=signal_generator
    volumes:
      - arcticdb_data:/data/arcticdb
      - ${TOKENS_PATH:-~/.tokens}:/root/.tokens
      - "./Kalshi by Cemini/private_key.pem:/app/private_key.pem"
      - ./archives:/mnt/archive
      - ./scripts:/app/scripts
    depends_on:
      - redis
      - postgres
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- CEMINI OS (Streamlit Dashboard) ---
  cemini_os:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    image: cemini-ui:latest
    container_name: cemini_os
    restart: always
    expose:
      - "8501"
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
    networks:
      - edge_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- THE VISUAL NERVOUS SYSTEM (Telemetry) ---
  deephaven:
    image: ghcr.io/deephaven/server:latest
    container_name: deephaven
    restart: always
    expose:
      - "10000"
    environment:
      - START_HELIX=true
    volumes:
      - deephaven_data:/data
      - ./ui:/notebooks/ui
    depends_on:
      - postgres
      - redis
    networks:
      - edge_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_viz
    restart: always
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS:-admin}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./.grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards/cemini:/var/lib/grafana/dashboards/cemini
    depends_on:
      - postgres
    networks:
      - edge_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first

  # --- PERIMETER DEFENSE ---
  nginx:
    image: nginx:alpine
    container_name: cemini_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cemini_os
      - grafana
    networks:
      - edge_net
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    depends_on:
      - nginx
    networks:
      - edge_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- PLAYBOOK LAYER (Regime + Signals + Risk → RL training bridge) ---
  playbook:
    build:
      context: .
      dockerfile: Dockerfile.playbook
    image: cemini-playbook:latest
    container_name: playbook_runner
    restart: always
    volumes:
      - .:/app
      - ./archives:/mnt/archive
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cemini_redis_2026}
      - DB_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quest}
      - SCAN_INTERVAL=${PLAYBOOK_SCAN_INTERVAL:-300}
    command: ["python", "-m", "trading_playbook.runner"]
    depends_on:
      - redis
      - postgres
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- CEMINI MCP INTELLIGENCE SERVER (Step 27) ---
  cemini_mcp:
    build:
      context: .
      dockerfile: cemini_mcp/Dockerfile
    image: cemini-mcp:latest
    container_name: cemini_mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=cemini_redis_2026
      - DB_HOST=postgres
      - POSTGRES_PASSWORD=quest
      - MCP_PORT=8002
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      - redis
      - postgres
    networks:
      - app_net
      - data_net
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- PORTAINER CE (Step 34b) — Container Management UI ---
  # Accessible at /portainer/ via nginx proxy.
  # In Swarm mode: pinned to manager node via placement constraint.
  # Port 9000 (HTTP) — nginx handles TLS termination upstream.
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    command: ["--base-url", "/portainer"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    expose:
      - "9000"
    networks:
      - edge_net
      - app_net
    deploy:
      placement:
        constraints:
          - node.role == manager   # must run on manager for socket access
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first

  # --- DBMATE (Step 38) — Schema Migration Runner ---
  # Runs db/migrations in order then exits (restart_policy: none).
  # Depends on postgres healthcheck so it waits for the DB to be ready.
  # In Swarm mode deploy.restart_policy condition: none prevents restart loops.
  dbmate:
    image: ghcr.io/amacneil/dbmate:2
    container_name: dbmate
    command: ["--wait", "up"]
    environment:
      - DATABASE_URL=postgres://admin:${POSTGRES_PASSWORD:-quest}@postgres:5432/qdb?sslmode=disable
    volumes:
      - ./db:/db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data_net
    deploy:
      restart_policy:
        condition: none

  # ============================================================
  # Step 35 — Observability Stack (LGTM)
  # Start individually: docker compose up -d prometheus loki alloy tempo
  #                                        redis-exporter postgres-exporter node-exporter
  # Total RAM budget: ~600 MB for all 7 services.
  # ============================================================

  # --- Prometheus (metrics collector + TSDB) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 150M
      update_config:
        order: start-first

  # --- Loki (log aggregation) ---
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    expose:
      - "3100"
    networks:
      - data_net
    healthcheck:
      # Loki uses a distroless image — no shell/wget; use the binary itself
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 200M
      update_config:
        order: start-first

  # --- Grafana Alloy (unified collector: logs → Loki, traces → Tempo) ---
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: always
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--storage.path=/var/lib/alloy/data"
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - alloy_data:/var/lib/alloy/data
    expose:
      - "4317"
      - "4318"
      - "12345"
    networks:
      - app_net
      - data_net
    depends_on:
      - loki
      - tempo
    healthcheck:
      # Alloy has bash; use /dev/tcp to check the HTTP UI is responding
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/12345 && echo -e 'GET /-/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200' <&3"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 100M
      update_config:
        order: start-first

  # --- Grafana Tempo (distributed tracing backend) ---
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: always
    command: -config.file=/etc/tempo/tempo-config.yml
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    expose:
      - "3200"
      - "4317"
      - "4318"
    networks:
      - data_net
    healthcheck:
      # Tempo is distroless — use binary version check as liveness probe
      test: ["CMD", "/tempo", "-version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 150M
      update_config:
        order: start-first

  # --- Redis Exporter (Redis metrics → Prometheus) ---
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis_exporter
    restart: always
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-cemini_redis_2026}
    expose:
      - "9121"
    depends_on:
      - redis
    networks:
      - data_net
    healthcheck:
      # redis_exporter is distroless — use binary version check as liveness probe
      test: ["CMD", "/redis_exporter", "--version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 32M
      update_config:
        order: start-first

  # --- Postgres Exporter (Postgres metrics → Prometheus) ---
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://admin:${POSTGRES_PASSWORD:-quest}@postgres:5432/qdb?sslmode=disable
    expose:
      - "9187"
    depends_on:
      - postgres
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9187/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 32M
      update_config:
        order: start-first

  # --- Node Exporter (host CPU/RAM/disk/network → Prometheus) ---
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: always
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - data_net
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          memory: 32M
      update_config:
        order: start-first

volumes:
  postgres_data:
  redis_data:
  deephaven_data:
  arcticdb_data:
  portainer_data:    # Step 34b
  prometheus_data:   # Step 35a
  loki_data:         # Step 35b
  alloy_data:        # Step 35c
  tempo_data:        # Step 35d

networks:
  # No explicit driver — compose uses bridge, Swarm uses overlay (default).
  # Both modes work with these names; Swarm adds stack prefix: cemini_<net>.
  edge_net:
    attachable: true
  app_net:
    attachable: true
  data_net:
    attachable: true
