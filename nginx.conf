events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Cemini OS Dashboard
        location / {
            proxy_pass http://cemini_os:8501;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # Grafana Viz — no trailing slash: preserves /grafana/ prefix for SERVE_FROM_SUB_PATH
        location /grafana/ {
            proxy_pass http://grafana_viz:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Portainer CE — Container Management UI (Step 34b)
        # Portainer is started with --base-url /portainer
        location /portainer/ {
            proxy_pass http://portainer:9000/portainer/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support for Portainer terminal feature
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 900;
        }
    }
}
